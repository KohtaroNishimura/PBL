<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ギターの数字あそび | 五度圏で学ぶダイアトニックコード</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="hero">
        <p class="eyebrow">Guitar Theory for Kids</p>
        <h1>ギターの数字あそび</h1>
        <p class="hero-copy">五度圏からキーをえらぶと、そのキーの「なかまコード」と役割がわかるアプリ</p>
      </header>

      <section class="panel" aria-labelledby="home-title">
        <div class="panel-header">
          <h2 id="home-title">1. 五度圏からキーをえらぼう</h2>
          <p>キーをタップすると、そのキーのなかまコードが表示されます。</p>
        </div>

        <div class="circle-wrap" role="group" aria-label="五度圏キー選択">
          <div class="circle-note center-note" id="selected-key-chip" aria-live="polite">C</div>
          <div id="circle-notes-layer"></div>
        </div>

        <p id="parallel-minor" class="parallel-minor" aria-live="polite"></p>
      </section>

      <section class="panel" aria-labelledby="key-detail-title">
        <div class="panel-header">
          <h2 id="key-detail-title">2. キーのなかまコード</h2>
          <p id="key-description">キーを選ぶと、ここにダイアトニックコードが表示されます。</p>
        </div>

        <div id="diatonic-grid" class="diatonic-grid"></div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
